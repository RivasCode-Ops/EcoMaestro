<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoMaestro — Painel CEO</title>
  <style>
    :root { --bg:#0c0e14; --card:#1c2436; --border:#2d3854; --text:#e8ecf4; --muted:#8d96ad; --accent:#7c9cff; --accent2:#5ee0b8; --warn:#f0c060; --font:system-ui,sans-serif; }
    *{box-sizing:border-box;margin:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);padding:1.5rem 1rem 3rem;line-height:1.5}
    .wrap{max-width:820px;margin:0 auto}
    h1{font-size:1.45rem;font-weight:800}
    .lead{color:var(--muted);font-size:.9rem;margin:.5rem 0 1.25rem}
    nav{margin-bottom:1rem;font-size:.85rem}
    nav a{color:var(--accent2);margin-right:1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem;margin-bottom:1rem}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:.65rem;padding:.85rem}
    .kpi .n{font-size:1.75rem;font-weight:800;color:var(--accent2)}
    .kpi .l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:.25rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:1rem 1.1rem;margin-bottom:1rem}
    .card h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.65rem}
    .bar-row{display:flex;align-items:center;gap:.5rem;margin:.35rem 0;font-size:.82rem}
    .bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
    .bar i{display:block;height:100%;background:var(--accent)}
    .list{font-size:.82rem}
    .list a{display:block;padding:.4rem 0;border-bottom:1px solid var(--border);color:var(--text);text-decoration:none}
    .list a:hover{color:var(--accent2)}
    .err{color:var(--warn);padding:1rem;border:1px solid rgba(240,192,96,.4);border-radius:.5rem}
    button{padding:.45rem .85rem;border-radius:.45rem;border:1px solid var(--border);background:var(--card);color:var(--text);font:inherit;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="/">← Demandas</a><a href="/" id="linkRefresh">Atualizar</a></nav>
    <h1>Painel CEO — condomínio ECO</h1>
    <p class="lead">Saúde local das demandas (JSON em <code>data/demands/</code>). v1.3 — síndico com painel.</p>
    <div id="errBox" class="err" hidden></div>
    <div class="grid" id="kpiGrid"></div>
    <div class="card">
      <h2>Demandas por status</h2>
      <div id="statusBars"></div>
    </div>
    <div class="card">
      <h2>Último morador que registrou passo</h2>
      <div id="residentBars"></div>
    </div>
    <div class="card">
      <h2>Sem atividade há 7+ dias (abertas)</h2>
      <div class="list" id="staleList"></div>
    </div>
    <div class="card">
      <h2>Abrir por status</h2>
      <div class="list" id="statusLinks"></div>
    </div>
  </div>
  <script type="module" src="painel.mjs"></script>
</body>
</html>
